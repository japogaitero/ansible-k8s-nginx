---
- name: Deploy Custom Nginx Portfolio to Kubernetes
  hosts: localhost
  connection: local
  tasks:
    - name: Ensure the project namespace exists
      kubernetes.core.k8s:
        name: portfolio-nginx
        kind: Namespace
        state: present

    - name: Create ConfigMap for custom website content
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: nginx-index-html
            namespace: portfolio-nginx
          data:
            index.html: |
              <!DOCTYPE html>
              <html>
              <head>
                  <title>Victor's Portfolio</title>
                  <style>
                      body { font-family: sans-serif; text-align: center; margin-top: 50px; background-color: #f4f4f9; }
                      h1 { color: #2c3e50; }
                      p { color: #7f8c8d; }
                      .badge { background: #42b883; color: white; padding: 5px 10px; border-radius: 5px; }
                  </style>
              </head>
              <body>
                  <h1>Welcome to Victor's Portfolio</h1>
                  <p>This page was deployed automatically using <span class="badge">Ansible</span> and <span class="badge">Kubernetes</span>.</p>
                  <p>Infrastructure as Code in action!</p>
              </body>
              </html>

    - name: Create Nginx deployment with custom index
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: nginx-server
            namespace: portfolio-nginx
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: portfolio-web
            template:
              metadata:
                labels:
                  app: portfolio-web
              spec:
                containers:
                - name: nginx
                  image: nginx:latest
                  ports:
                  - containerPort: 80
                  volumeMounts:
                  - name: html-volume
                    mountPath: /usr/share/nginx/html/index.html
                    subPath: index.html
                volumes:
                - name: html-volume
                  configMap:
                    name: nginx-index-html

    - name: Expose Nginx service via NodePort
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: nginx-service
            namespace: portfolio-nginx
          spec:
            type: NodePort
            selector:
              app: portfolio-web
            ports:
              - port: 80
                targetPort: 80
                nodePort: 30080